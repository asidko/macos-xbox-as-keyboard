name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup signing
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certs/dev.p12 -k build.keychain -P temp123 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Build universal binary
        run: |
          make generate-build-info
          swift build -c release --arch arm64 --arch x86_64
          mkdir -p .build/release/XboxAsKeyboard.app/Contents/MacOS .build/release/XboxAsKeyboard.app/Contents/Resources
          cp .build/apple/Products/Release/XboxAsKeyboard .build/release/XboxAsKeyboard.app/Contents/MacOS/
          cp Info.plist .build/release/XboxAsKeyboard.app/Contents/
          cp Resources/AppIcon.icns .build/release/XboxAsKeyboard.app/Contents/Resources/
          codesign --force --sign "XboxAsKeyboard Dev" .build/release/XboxAsKeyboard.app

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R .build/release/XboxAsKeyboard.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "XboxAsKeyboard" -srcfolder dmg-staging -ov -format UDZO XboxAsKeyboard.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: XboxAsKeyboard.dmg
          generate_release_notes: true
