name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build universal binary
        run: make build-universal

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R .build/release/XboxAsKeyboard.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "XboxAsKeyboard" -srcfolder dmg-staging -ov -format UDZO XboxAsKeyboard.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: XboxAsKeyboard.dmg
          generate_release_notes: true
