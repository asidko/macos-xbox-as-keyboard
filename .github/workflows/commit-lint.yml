name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          COMMITS=$(git log --format='%s' origin/${{ github.base_ref }}..HEAD)
          PATTERN='^(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if [[ -z "$msg" ]]; then continue; fi
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "Bad commit message: $msg"
              echo "  Expected: type(scope): description"
              echo "  Types: feat, fix, chore, docs, style, refactor, perf, test, ci, build, revert"
              FAILED=1
            fi
          done <<< "$COMMITS"
          if [[ $FAILED -eq 1 ]]; then exit 1; fi
          echo "All commits follow conventional commit style"
